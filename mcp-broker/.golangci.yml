version: "2"
linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
  settings:
    gosec:
      excludes:
        - G304 # file path from variable (we need this for config paths)
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
formatters:
  enable:
    - goimports
